version: '3.8'

networks:
  frontend:   # sieć dla ruchu zewnętrznego (Nginx)
  backend:    # sieć wewnętrzna (PHP, MySQL, phpMyAdmin)

services:

  nginx:
    image: nginx:1.25
    ports:
      - "4001:80"         # Nginx dostępny na porcie 4001
    volumes:
      - ./www:/var/www/html                          # pliki strony
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf  # konfiguracja
    networks:
      - frontend
      - backend           # musi widzieć kontener PHP
    depends_on:
      - php

  php:
    build: ./php          # budujemy własny obraz z rozszerzeniami MySQL
    volumes:
      - ./www:/var/www/html   # ten sam katalog co Nginx
    networks:
      - backend           # tylko sieć wewnętrzna
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: testdb      # baza tworzona automatycznie przy starcie
      MYSQL_USER: user
      MYSQL_PASSWORD: userpassword
    networks:
      - backend           # brak dostępu z zewnątrz – tylko przez backend

  phpmyadmin:
    image: phpmyadmin:5.2
    ports:
      - "6001:80"         # phpMyAdmin dostępny na porcie 6001
    environment:
      PMA_HOST: mysql               # nazwa hosta MySQL (nazwa serwisu)
      MYSQL_ROOT_PASSWORD: rootpassword
    networks:
      - backend           # wystarczy backend – widzi MySQL, port 6001 daje dostęp z zewnątrz