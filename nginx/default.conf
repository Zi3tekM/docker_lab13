server {
    listen 80;
    server_name localhost;
    root /var/www/html;   # katalog z plikami strony
    index index.php index.html;

    # obsługa wszystkich żądań
    location / {
        try_files $uri $uri/ =404;
    }

    # przekazanie plików .php do PHP-FPM
    location ~ \.php$ {
        fastcgi_pass php:9000;        # adres kontenera PHP (nazwa serwisu + port FPM)
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}